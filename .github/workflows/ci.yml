name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/manifest.json || (echo "dist/manifest.json missing" && exit 1)
          test -f dist/content.js    || (echo "dist/content.js missing"    && exit 1)
          test -f dist/popup.js      || (echo "dist/popup.js missing"      && exit 1)
          test -f dist/popup.html    || (echo "dist/popup.html missing"    && exit 1)
          echo "All dist artifacts present."
