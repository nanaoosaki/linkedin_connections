<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body      { width: 260px; padding: 12px; font-family: sans-serif; }
    button    { width: 100%; padding: 8px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #progress { display: none; margin-top: 8px; width: 100%; height: 6px;
                appearance: none; border: 1px solid #ccc; border-radius: 3px; }
    #progress::-webkit-progress-bar   { background: #eee; border-radius: 3px; }
    #progress::-webkit-progress-value { background: #0a66c2; border-radius: 3px; }
    #status   { margin-top: 6px; font-size: 12px; color: #555; min-height: 16px; }
    #eta      { margin-top: 2px; font-size: 11px; color: #888; min-height: 14px; }
  </style>
</head>
<body>
  <button id="export">Export Connections</button>
  <progress id="progress"></progress>
  <div id="status"></div>
  <div id="eta"></div>
  <script src="popup.js"></script>
</body>
</html>
